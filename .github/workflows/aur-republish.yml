name: AUR Republish

# Manually re-publish an already-released version to the AUR.
# Use this when the `aur` job in release.yml failed but the GitHub release
# (and its tarballs) were created successfully — avoids cutting a new tag.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to republish (without leading v, e.g. 0.4.9)"
        required: true
        type: string

jobs:
  aur:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update PKGBUILD version and checksums
        run: |
          cd aur
          PKGVER="${{ inputs.version }}"
          TAG="v${PKGVER}"

          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD

          BASE_URL="https://github.com/ssp-data/neomd/releases/download/${TAG}"
          curl -fsSL "${BASE_URL}/neomd_${PKGVER}_linux_amd64.tar.gz" -o amd64.tar.gz
          curl -fsSL "${BASE_URL}/neomd_${PKGVER}_linux_arm64.tar.gz" -o arm64.tar.gz

          SHA_AMD64=$(sha256sum amd64.tar.gz | cut -d' ' -f1)
          SHA_ARM64=$(sha256sum arm64.tar.gz | cut -d' ' -f1)

          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA_AMD64}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${SHA_ARM64}')/" PKGBUILD

          rm -f amd64.tar.gz arm64.tar.gz

          cat PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: neomd-bin
          pkgbuild: aur/PKGBUILD
          commit_username: Simon Späti
          commit_email: simon@ssp.sh
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ inputs.version }}"
